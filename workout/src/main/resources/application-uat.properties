server.port=8092
spring.application.name=workout
spring.cloud.aws.region.static=ap-east-1
spring.config.import=aws-secretsmanager:/mwp/docdb/connectionDetails
spring.mongodb.uri=mongodb://${username}:${password}@${host}:${port}/${dbname}?tls=true&replicaSet=rs0&readPreference=secondaryPreferred&retryWrites=false&connectTimeoutMS=10000&socketTimeoutMS=45000
secretId=/mwp/docdb/connectionDetails
documentdb.ssl.cert-path=file:/app/global-bundle.pem
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.transport=grpc
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4317
management.defaults.metrics.export.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false